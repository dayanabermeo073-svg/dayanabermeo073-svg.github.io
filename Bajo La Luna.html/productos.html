<script>
function crearSeccion(titulo, imagenes) {
    let html = `<h2 class="mt-5 mb-3">${titulo}</h2><div class="row">`;
    imagenes.forEach(libro => {
        html += `
        <div class="col-md-4 col-lg-2 mb-4">
            <div class="card h-100 shadow">
                <img src="${libro.img}" class="card-img-top">
                <div class="card-body text-center">
                    <p class="fw-bold">S/ ${libro.precio}</p>
                    <a href="Pedidos.html" class="btn btn-primary w-100">Añadir</a>
                </div>
            </div>
        </div>`;
    });
    html += `</div>`;
    document.write(html);
}

<script>
function crearSeccionVideos(titulo, videos) {
    let html = `<h2 class="mt-5 mb-3">${titulo}</h2><div class="row">`;

    videos.forEach(video => {
        html += `
        <div class="col-md-4 col-lg-2 mb-4">
            <div class="card h-100 shadow text-center">
                <video class="w-100" controls>
                    <source src="${video.src}" type="video/mp4">
                </video>
                <div class="card-body">
                    <p class="fw-bold">${video.titulo}</p>
                    <button class="btn btn-success w-100">Más detalles</button>
                </div>
            </div>
        </div>`;
    });

    html += `</div>`;
    document.write(html);
}
